name: Validate

on:
  push:
    branches: [main]
    paths:
      - "*.json"
      - "*.md"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "*.json"
      - "*.md"
      - ".github/workflows/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npx --yes --package renovate@43 -- renovate-config-validator *.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npx --yes markdownlint-cli2@0 "**/*.md"
